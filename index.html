<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantongxue</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        @font-face {
            font-family: mylogo;   
            src: url("HarmonyOS_SansItalic_Medium");  
        }

        .navbar {
            width: 100%;
            height: 60px;
            background: #111112;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 35px;
            border-bottom: 1px solid #2a2a2a;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 20px;
            font-weight: 600;

            font-family: mylogo; 
        }

        .logo img {
            height: 32px;
        }

        .menu a {
            color: #dcdcdc;
            text-decoration: none;
            font-size: 15px;
            margin-left: 30px;
        }
        .menu a:hover {
            color: white;
        }

        .product-img {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            margin-top: 60px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">
        <img src="logo.png" alt="">
        Fantongxue Software
    </div>

    <div class="menu">
        <a href="#">首页</a>
        <a href="#">关于</a>
    </div>
</div>

<img class="product-img" src="横版宣传图2.png">

</body>
</html>
